<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Galerie & Notizen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --yellow: #fff59d; --line: #e0d58a; }
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; overflow: hidden; }
        
        /* Galerie */
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .swiper-slide img { max-width: 100%; max-height: 90%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .img-label { margin-top: 10px; font-size: 14px; opacity: 0.6; }

        /* Gelber Button */
        #note-trigger {
            position: fixed; bottom: 30px; right: 30px;
            width: 65px; height: 65px; background: #ffd600;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); font-size: 30px;
        }

        /* Notiz-Overlay */
        #note-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--yellow); z-index: 2000; display: none; flex-direction: column;
        }

        .note-page {
            flex: 1; width: 100%; padding: 40px 25px; box-sizing: border-box;
            background-color: var(--yellow);
            background-image: linear-gradient(var(--line) 1px, transparent 1px);
            background-size: 100% 30px;
            line-height: 30px; font-size: 19px; border: none; outline: none;
            resize: none; color: #444; font-family: 'Courier New', Courier, monospace;
        }

        .nav { display: flex; justify-content: space-between; padding: 15px; background: #f9a825; color: white; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; background: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="note-trigger">📝</div>

<div class="swiper">
    <div id="gallery-wrapper" class="swiper-wrapper">
        </div>
</div>

<div id="note-overlay">
    <div class="nav">
        <button class="btn" onclick="toggleNotes()">Fertig</button>
        <div style="line-height: 34px;">Meine Notizen</div>
        <button class="btn" onclick="addPage()">+ Seite</button>
    </div>
    <div id="pages-container" style="display: flex; flex-direction: column; overflow-y: auto; flex: 1;">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // --- 1. AUTOMATISCHE BILDER-SCHLEIFE ---
    const wrapper = document.getElementById('gallery-wrapper');
    const dateiEndung = ".jpg"; // Hier .png oder .jpg eintragen, je nachdem was du hast

    for (let i = 1; i <= 100; i++) {
        // Macht aus 1 -> "01", aus 9 -> "09", aus 10 -> "10"
        let nummer = i.toString().padStart(2, '0'); 
        
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `
            <img src="${nummer}${dateiEndung}" alt="Bild ${nummer}" onerror="this.parentElement.style.display='none'">
            <div class="img-label">Bild ${nummer}</div>
        `;
        wrapper.appendChild(slide);
    }

    const swiper = new Swiper('.swiper', { loop: false, grabCursor: true });

    // --- 2. NOTIZEN MIT SPEICHERFUNKTION ---
    const overlay = document.getElementById('note-overlay');
    const pagesContainer = document.getElementById('pages-container');

    // Laden beim Start
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('myNotes') || '[""]');
        saved.forEach(text => createNoteElement(text));
    };

    function toggleNotes() {
        if (overlay.style.display === 'flex') {
            saveAllNotes();
            overlay.style.display = 'none';
        } else {
            overlay.style.display = 'flex';
        }
    }

    function createNoteElement(content = "") {
        const txt = document.createElement('textarea');
        txt.className = 'note-page';
        txt.value = content;
        txt.placeholder = "Tippe hier...";
        txt.oninput = saveAllNotes;
        pagesContainer.appendChild(txt);
    }

    function addPage() {
        createNoteElement();
        pagesContainer.lastChild.focus();
    }

    function saveAllNotes() {
        const allTexts = Array.from(document.querySelectorAll('.note-page')).map(t => t.value);
        localStorage.setItem('myNotes', JSON.stringify(allTexts));
    }

    document.getElementById('note-trigger').onclick = toggleNotes;
</script>
</body>
</html>
