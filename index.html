<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DCS Checklist & Notes Pro</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root { 
            --dark-ui: #1a1a1a;
            --accent-gold: #fbc02d;
            --line-color: rgba(0,0,0,0.12); 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; touch-action: none; }
        
        /* Galerie mit riesiger Scrollbar für Stress-Situationen */
        .swiper-main { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; border-right: 1px solid #222; }
        .swiper-slide img { max-width: 98%; max-height: 90%; object-fit: contain; }
        
        /* Scrollbar: Viel höher (30px) für bessere Treffsicherheit */
        .swiper-scrollbar { 
            height: 30px !important; 
            background: rgba(255, 255, 255, 0.15) !important; 
            bottom: 10px !important; 
            border-radius: 15px !important;
        }
        .swiper-scrollbar-drag { background: var(--accent-gold) !important; }

        /* Trigger Icon */
        #note-trigger {
            position: fixed; bottom: 50px; right: 30px;
            width: 70px; height: 70px; background: #2c2c2c;
            border-radius: 20px; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
            border: 2px solid var(--accent-gold);
        }
        #note-trigger svg { width: 35px; height: 35px; fill: #ffd700; }

        /* Notiz-Overlay */
        #note-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: none; flex-direction: column;
        }
        
        .nav-bar, .tool-bar {
            display: flex; gap: 12px; align-items: center;
            padding: env(safe-area-inset-top) 15px 10px 15px; background: var(--dark-ui);
        }

        /* Größere Buttons für Touch-Bedienung */
        .btn { 
            padding: 12px 18px; border: none; border-radius: 10px; background: #444; color: white; 
            font-weight: bold; cursor: pointer; font-size: 16px; min-height: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-add { background: #388e3c; }
        .btn-del-page { background: #d32f2f; min-width: 50px; }
        .btn-active { background: var(--accent-gold); color: black; }
        .btn-undo { background: #555; }

        /* Farbwähler (Input) */
        #bg-picker-container { display: flex; align-items: center; gap: 8px; color: white; font-size: 14px; }
        #bg-picker { width: 45px; height: 45px; border: 2px solid #666; border-radius: 8px; background: none; cursor: pointer; padding: 0; }

        #tab-container { display: flex; gap: 8px; overflow-x: auto; flex: 1; scrollbar-width: none; }
        .tab { padding: 12px 20px; background: #333; color: #fff; border-radius: 10px; border: none; font-size: 15px; white-space: nowrap; }
        .tab.active { background: var(--accent-gold); color: #000; font-weight: bold; }

        #canvas-container { flex: 1; position: relative; }
        #lined-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 32px; background-position: 0 10px;
        }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="note-trigger">
    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
</div>

<div class="swiper swiper-main">
    <div id="gallery-wrapper" class="swiper-wrapper"></div>
    <div class="swiper-scrollbar"></div>
</div>

<div id="note-overlay">
    <div class="nav-bar">
        <button class="btn" onclick="toggleNotes()">✕ Close</button>
        <div id="tab-container"></div>
        <button class="btn btn-add" onclick="addNewPage()">+ Seite</button>
        <button class="btn btn-del-page" onclick="deleteCurrentPage()">✕</button>
    </div>
    
    <div class="tool-bar">
        <button id="tool-pen" class="btn btn-active" onclick="setTool('pen')">✏️ Stift</button>
        <button id="tool-eraser" class="btn" onclick="setTool('eraser')">🧼 Radierer</button>
        <button class="btn btn-undo" onclick="undo()">↩️ Undo</button>
        <button class="btn" onclick="clearCanvas()">🗑️ Alles leeren</button>
        
        <div style="flex:1"></div>
        
        <div id="bg-picker-container">
            <span>BG:</span>
            <input type="color" id="bg-picker" value="#ffeb3b" oninput="changePageColor(this.value)">
        </div>
    </div>

    <div id="canvas-container">
        <div id="lined-pattern"></div>
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const wrapper = document.getElementById('gallery-wrapper');
    const moeglicheEndungen = [".png", ".PNG", ".jpg", ".JPG", ".jpeg", ".JPEG"];

    async function initGallery() {
        for (let i = 1; i <= 100; i++) {
            let nummer = i.toString().padStart(2, '0');
            for (let endung of moeglicheEndungen) {
                const pfad = `${nummer}${endung}`;
                const existiert = await new Promise(res => {
                    const img = new Image(); img.onload = () => res(true); img.onerror = () => res(false); img.src = pfad;
                });
                if (existiert) {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.innerHTML = `<img src="${pfad}">`;
                    wrapper.appendChild(slide);
                    break; 
                }
            }
        }
        new Swiper('.swiper-main', { slidesPerView: 2, scrollbar: { el: '.swiper-scrollbar', draggable: true } });
    }

    // --- NOTIZ-LOGIK ---
    let pages = JSON.parse(localStorage.getItem('notebook_v7')) || [{ image: "", color: "#ffeb3b" }];
    let currentPageIndex = 0;
    let currentTool = 'pen';
    let historyStack = []; // Speicher für Undo
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - offset;
        drawPage();
        renderTabs();
    }

    function renderTabs() {
        const container = document.getElementById('tab-container');
        container.innerHTML = "";
        pages.forEach((_, index) => {
            const t = document.createElement('button');
            t.className = `tab ${index === currentPageIndex ? 'active' : ''}`;
            t.innerText = `P${index + 1}`;
            t.onclick = () => { saveCurrentState(); currentPageIndex = index; drawPage(); renderTabs(); };
            container.appendChild(t);
        });
    }

    function drawPage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const page = pages[currentPageIndex];
        document.getElementById('canvas-container').style.background = page.color || "#ffeb3b";
        document.getElementById('bg-picker').value = page.color || "#ffeb3b";
        
        if (page.image && page.image.length > 100) {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                saveToHistory(); // Initialen Zustand in History
            };
            img.src = page.image;
        } else {
            saveToHistory();
        }
    }

    function saveCurrentState() {
        pages[currentPageIndex].image = canvas.toDataURL();
        localStorage.setItem('notebook_v7', JSON.stringify(pages));
    }

    // --- UNDO LOGIK ---
    function saveToHistory() {
        historyStack.push(canvas.toDataURL());
        if (historyStack.length > 30) historyStack.shift(); // Max 30 Schritte
    }

    function undo() {
        if (historyStack.length > 1) {
            historyStack.pop(); // Aktuellen Zustand wegwerfen
            const previous = historyStack[historyStack.length - 1];
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                saveCurrentState();
            };
            img.src = previous;
        }
    }

    function changePageColor(color) {
        pages[currentPageIndex].color = color;
        document.getElementById('canvas-container').style.background = color;
        saveCurrentState();
    }

    function addNewPage() {
        saveCurrentState();
        pages.push({ image: "", color: "#ffeb3b" });
        currentPageIndex = pages.length - 1;
        historyStack = [];
        resizeCanvas();
    }

    function deleteCurrentPage() {
        if (pages.length <= 1) {
            clearCanvas();
            return;
        }
        pages.splice(currentPageIndex, 1);
        currentPageIndex = Math.max(0, currentPageIndex - 1);
        historyStack = [];
        resizeCanvas();
        localStorage.setItem('notebook_v7', JSON.stringify(pages));
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        saveCurrentState();
        saveToHistory();
    }

    // --- TOUCH EVENTS ---
    canvas.addEventListener('touchstart', (e) => {
        drawing = true; 
        ctx.beginPath();
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const y = e.touches[0].clientY - rect.top;
        ctx.moveTo(x, y);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const y = e.touches[0].clientY - rect.top;
        
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (currentTool === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out'; 
            ctx.lineWidth = 45;
        } else {
            ctx.globalCompositeOperation = 'source-over'; 
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 2.5;
        }
        ctx.lineTo(x, y);
        ctx.stroke();
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', () => { 
        if(drawing) {
            drawing = false; 
            saveCurrentState(); 
            saveToHistory();
        }
    });

    function setTool(t) { 
        currentTool = t; 
        document.getElementById('tool-pen').classList.toggle('btn-active', t==='pen'); 
        document.getElementById('tool-eraser').classList.toggle('btn-active', t==='eraser'); 
    }

    function toggleNotes() { 
        const o = document.getElementById('note-overlay'); 
        o.style.display = (o.style.display !== 'flex' ? 'flex' : 'none'); 
        if(o.style.display==='flex') resizeCanvas(); 
    }

    document.getElementById('note-trigger').onclick = toggleNotes;
    window.addEventListener('resize', resizeCanvas);
    initGallery();
</script>
</body>
</html>
