<div id="note-overlay">
    <div class="nav">
        <button class="btn" onclick="toggleNotes()">Schließen</button>
        <div id="page-info" style="line-height: 34px;">Seite 1</div>
        <div class="controls">
            <button class="btn" onclick="clearCanvas()">Löschen</button>
            <button class="btn" onclick="addPage()">+ Seite</button>
        </div>
    </div>
    <div id="canvas-container" style="flex: 1; position: relative; background: var(--yellow);">
        <div id="lined-pattern" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; 
            background-image: linear-gradient(var(--line) 1px, transparent 1px); background-size: 100% 30px;"></div>
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // --- 1. BILDER-SCHLEIFE ---
    const wrapper = document.getElementById('gallery-wrapper');
    const dateiEndung = ".jpg"; 

    for (let i = 1; i <= 100; i++) {
        let nummer = i.toString().padStart(2, '0'); 
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `<img src="${nummer}${dateiEndung}" alt="Bild ${nummer}" onerror="this.parentElement.style.display='none'">`;
        wrapper.appendChild(slide);
    }
    const swiper = new Swiper('.swiper', { loop: false });

    // --- 2. ZEICHEN-LOGIK (CANVAS) ---
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Canvas Größe an das iPad anpassen
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 60; // Abzug der Navigationsleiste
        loadCanvas(); // Gespeichertes laden
    }

    window.addEventListener('resize', resizeCanvas);
    window.onload = resizeCanvas;

    // Touch-Events für das iPad
    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);

    function startDrawing(e) {
        drawing = true;
        const touch = e.touches[0];
        ctx.beginPath();
        ctx.moveTo(touch.clientX, touch.clientY - 60);
        e.preventDefault();
    }

    function draw(e) {
        if (!drawing) return;
        const touch = e.touches[0];
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#333'; // Dunkelgraue "Tinte"
        ctx.lineTo(touch.clientX, touch.clientY - 60);
        ctx.stroke();
        e.preventDefault();
    }

    function stopDrawing() {
        drawing = false;
        saveCanvas();
    }

    function clearCanvas() {
        if(confirm("Diese Seite wirklich löschen?")) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            saveCanvas();
        }
    }

    // --- 3. SPEICHERN & STEUERUNG ---
    const overlay = document.getElementById('note-overlay');

    function toggleNotes() {
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        if(overlay.style.display === 'flex') resizeCanvas();
    }

    function saveCanvas() {
        const data = canvas.toDataURL();
        localStorage.setItem('myHandwrittenNote', data);
    }

    function loadCanvas() {
        const data = localStorage.getItem('myHandwrittenNote');
        if (data) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data;
        }
    }

    document.getElementById('note-trigger').onclick = toggleNotes;
</script>
