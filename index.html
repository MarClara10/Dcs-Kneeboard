<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Checklist Ultimate Pro</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root { 
            --note-bg: #fffde7; 
            --line-color: rgba(0,0,0,0.1); 
            --ui-acc: #fbc02d;
            --dark-ui: #2c2c2c;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, sans-serif;
            touch-action: none;
        }
        
        /* Galerie & Scrollbar Design */
        .swiper-main { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; border-right: 1px solid #222; }
        .swiper-slide img { max-width: 98%; max-height: 90%; object-fit: contain; }

        /* Die Scrollbar unten */
        .swiper-scrollbar {
            height: 12px !important;
            background: rgba(255, 255, 255, 0.1) !important;
            bottom: 10px !important;
            border-radius: 10px;
        }
        .swiper-scrollbar-drag {
            background: var(--ui-acc) !important;
            height: 100%;
        }

        /* Notiz-Icon */
        #note-trigger {
            position: fixed; bottom: 50px; right: 30px;
            width: 70px; height: 70px; background: #ffd600;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 35px; border: 3px solid #fff;
        }

        /* Notiz-Overlay */
        #note-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--note-bg); z-index: 2000; display: none; flex-direction: column;
        }
        
        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: env(safe-area-inset-top) 15px 10px 15px; background: var(--dark-ui); color: white;
        }

        .tool-bar {
            display: flex; gap: 12px; padding: 10px 15px; background: #3d3d3d; 
            overflow-x: auto; align-items: center; border-bottom: 1px solid #555;
        }

        .btn { padding: 10px 14px; border: none; border-radius: 8px; background: #eee; font-weight: bold; cursor: pointer; }
        .btn-page { background: var(--ui-acc); color: white; min-width: 44px; }
        .btn-active { outline: 3px solid #fff; }

        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; flex-shrink: 0; }

        #canvas-container { flex: 1; position: relative; background: var(--note-bg); }
        #lined-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 32px; background-position: 0 10px;
        }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="note-trigger">📝</div>

<div class="swiper swiper-main">
    <div id="gallery-wrapper" class="swiper-wrapper"></div>
    <div class="swiper-scrollbar"></div>
</div>

<div id="note-overlay">
    <div class="nav-bar">
        <button class="btn" onclick="toggleNotes()">Galerie</button>
        <div style="font-weight:bold">Seite <span id="current-page-num">1</span></div>
        <button class="btn" style="background:#ff5252; color:white;" onclick="clearCurrentPage()">Löschen</button>
    </div>
    
    <div class="tool-bar">
        <button class="btn btn-page" onclick="prevPage()">◀</button>
        <button class="btn btn-page" onclick="nextPage()">▶</button>
        <button class="btn" onclick="addNewPage()">+ Seite</button>
        <div style="width: 2px; height: 25px; background: #666;"></div>
        <button id="tool-pen" class="btn btn-active" onclick="setTool('pen')">✏️</button>
        <button id="tool-eraser" class="btn" onclick="setTool('eraser')">🧼</button>
        <div style="flex:1"></div>
        <div class="color-dot" style="background:#fffde7" onclick="changeBg('#fffde7')"></div>
        <div class="color-dot" style="background:#ffffff" onclick="changeBg('#ffffff')"></div>
        <div class="color-dot" style="background:#e3f2fd" onclick="changeBg('#e3f2fd')"></div>
    </div>

    <div id="canvas-container">
        <div id="lined-pattern"></div>
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const wrapper = document.getElementById('gallery-wrapper');
    const moeglicheEndungen = [".png", ".PNG", ".jpg", ".JPG", ".jpeg", ".JPEG"];

    // 1. Galerie Initialisierung
    async function initGallery() {
        for (let i = 1; i <= 100; i++) {
            let nummer = i.toString().padStart(2, '0');
            for (let endung of moeglicheEndungen) {
                const pfad = `${nummer}${endung}`;
                const existiert = await new Promise(res => {
                    const img = new Image(); img.onload = () => res(true); img.onerror = () => res(false); img.src = pfad;
                });
                if (existiert) {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.innerHTML = `<img src="${pfad}">`;
                    wrapper.appendChild(slide);
                    break; 
                }
            }
        }
        
        // Swiper mit Scrollbar-Funktion
        new Swiper('.swiper-main', { 
            slidesPerView: 2, 
            keyboard: true, 
            grabCursor: true,
            scrollbar: {
                el: '.swiper-scrollbar',
                draggable: true,   // Erlaubt das Ziehen des Balkens auf dem iPad
                hide: false,       // Balken bleibt immer sichtbar
            },
            mousewheel: true
        });
    }

    // 2. Notiz Logik (wie zuvor, inkl. Palm Rejection)
    let pages = JSON.parse(localStorage.getItem('notebook_v4')) || [""];
    let currentPageIndex = 0;
    let currentTool = 'pen';
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - offset;
        drawPage();
    }

    function drawPage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const data = pages[currentPageIndex];
        if (data && data.length > 100) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data;
        }
        document.getElementById('current-page-num').innerText = currentPageIndex + 1;
    }

    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1 && e.touches[0].touchType !== 'stylus') return;
        drawing = true; ctx.beginPath();
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        ctx.moveTo(e.touches[0].clientX, e.touches[0].clientY - offset);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!drawing || (e.touches.length > 1 && e.touches[0].touchType !== 'stylus')) return;
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (currentTool === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 40;
        } else {
            ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = '#222';
            ctx.lineWidth = (e.touches[0].touchType === 'stylus') ? 2.0 : 2.5;
        }
        ctx.lineTo(e.touches[0].clientX, e.touches[0].clientY - offset);
        ctx.stroke();
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', () => { drawing = false; pages[currentPageIndex] = canvas.toDataURL(); localStorage.setItem('notebook_v4', JSON.stringify(pages)); });

    function setTool(t) { currentTool = t; document.getElementById('tool-pen').classList.toggle('btn-active', t==='pen'); document.getElementById('tool-eraser').classList.toggle('btn-active', t==='eraser'); }
    function nextPage() { if(currentPageIndex < pages.length-1) { pages[currentPageIndex]=canvas.toDataURL(); currentPageIndex++; drawPage(); } }
    function prevPage() { if(currentPageIndex > 0) { pages[currentPageIndex]=canvas.toDataURL(); currentPageIndex--; drawPage(); } }
    function addNewPage() { pages[currentPageIndex]=canvas.toDataURL(); pages.push(""); currentPageIndex = pages.length-1; drawPage(); }
    function changeBg(c) { document.getElementById('canvas-container').style.background = c; }
    function toggleNotes() { const o = document.getElementById('note-overlay'); o.style.display = (o.style.display !== 'flex' ? 'flex' : 'none'); if(o.style.display==='flex') resizeCanvas(); }

    document.getElementById('note-trigger').onclick = toggleNotes;
    window.addEventListener('resize', resizeCanvas);
    initGallery();
</script>
</body>
</html>
