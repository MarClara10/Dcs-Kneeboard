<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Checklist Gallery</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root { 
            --yellow-bg: #fffde7; 
            --line-color: rgba(0,0,0,0.1); 
            --ui-acc: #fbc02d;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, sans-serif;
        }
        
        /* Galerie: Bilder nebeneinander */
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { 
            display: flex; justify-content: center; align-items: center; 
            background: #000; 
            border-right: 1px solid #333; /* Trennlinie zwischen den Bildern */
        }
        .swiper-slide img { 
            max-width: 98%; max-height: 100%; object-fit: contain; 
        }

        /* Gelber Button */
        #note-trigger {
            position: fixed; bottom: 40px; right: 30px;
            width: 70px; height: 70px; background: #ffd600;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 35px;
            border: 3px solid #fff;
        }

        /* Notiz-Overlay */
        #note-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--yellow-bg); z-index: 2000; 
            display: none; flex-direction: column;
        }
        
        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: env(safe-area-inset-top) 20px 15px 20px; 
            background: var(--ui-acc); color: white;
        }

        .btn { padding: 10px 18px; border: none; border-radius: 12px; background: white; font-weight: bold; }

        #canvas-container { flex: 1; position: relative; touch-action: none; }
        #lined-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 32px; background-position: 0 10px;
        }
        #noteCanvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="note-trigger">📝</div>

<div class="swiper">
    <div id="gallery-wrapper" class="swiper-wrapper">
        </div>
</div>

<div id="note-overlay">
    <div class="nav-bar">
        <button class="btn" onclick="toggleNotes()">Schließen</button>
        <span style="font-weight:bold">Notizen</span>
        <button class="btn" style="background:#ff5252; color:white;" onclick="clearCanvas()">Löschen</button>
    </div>
    <div id="canvas-container">
        <div id="lined-pattern"></div>
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const wrapper = document.getElementById('gallery-wrapper');
    const moeglicheEndungen = [".png", ".PNG", ".jpg", ".JPG", ".jpeg"];

    // 1. BILDER LADEN & ANZEIGEN
    async function initApp() {
        for (let i = 1; i <= 100; i++) {
            let nummer = i.toString().padStart(2, '0');
            for (let endung of moeglicheEndungen) {
                const pfad = `${nummer}${endung}`;
                const existiert = await new Promise(res => {
                    const img = new Image();
                    img.onload = () => res(true);
                    img.onerror = () => res(false);
                    img.src = pfad;
                });

                if (existiert) {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.innerHTML = `<img src="${pfad}">`;
                    wrapper.appendChild(slide);
                    break; 
                }
            }
        }

        // Swiper mit 2 Bildern nebeneinander
        new Swiper('.swiper', {
            slidesPerView: 2,    // ZEIGT 2 BILDER
            spaceBetween: 0,
            keyboard: true,
            grabCursor: true
        });
    }

    // 2. HANDSCHRIFT LOGIK
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.querySelector('.nav-bar').offsetHeight;
        loadCanvas();
    }

    canvas.addEventListener('touchstart', (e) => {
        drawing = true;
        const t = e.touches[0];
        ctx.beginPath();
        ctx.moveTo(t.clientX, t.clientY - document.querySelector('.nav-bar').offsetHeight);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const t = e.touches[0];
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#222';
        ctx.lineTo(t.clientX, t.clientY - document.querySelector('.nav-bar').offsetHeight);
        ctx.stroke();
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', () => { drawing = false; saveCanvas(); });

    function toggleNotes() {
        const overlay = document.getElementById('note-overlay');
        const show = overlay.style.display !== 'flex';
        overlay.style.display = show ? 'flex' : 'none';
        if(show) resizeCanvas();
    }

    function saveCanvas() { localStorage.setItem('note_img', canvas.toDataURL()); }
    function loadCanvas() {
        const data = localStorage.getItem('note_img');
        if(data) { const img = new Image(); img.onload = () => ctx.drawImage(img,0,0); img.src = data; }
    }
    function clearCanvas() { if(confirm("Löschen?")) { ctx.clearRect(0,0,canvas.width,canvas.height); saveCanvas(); } }

    document.getElementById('note-trigger').onclick = toggleNotes;
    
    // Start
    initApp();
</script>
</body>
</html>
