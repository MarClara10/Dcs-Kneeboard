<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Checklist & Notes Pro</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root { 
            --note-bg: #fffde7; 
            --line-color: rgba(0,0,0,0.1); 
            --ui-acc: #fbc02d;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* Galerie */
        .swiper-main { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; border-right: 1px solid #222; }
        .swiper-slide img { max-width: 98%; max-height: 100%; object-fit: contain; }

        /* Icon */
        #note-trigger {
            position: fixed; bottom: 40px; right: 30px;
            width: 70px; height: 70px; background: #ffd600;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 35px; border: 3px solid #fff;
        }

        /* Notiz-Overlay */
        #note-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--note-bg); z-index: 2000; display: none; flex-direction: column;
        }
        
        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: env(safe-area-inset-top) 15px 10px 15px; background: #333; color: white;
        }

        .tool-bar {
            display: flex; gap: 10px; padding: 10px; background: #444; overflow-x: auto;
        }

        .btn { padding: 8px 12px; border: none; border-radius: 8px; background: #eee; font-weight: bold; font-size: 14px; }
        .btn-page { background: var(--ui-acc); color: white; }

        /* Farbwähler */
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

        #canvas-container { flex: 1; position: relative; touch-action: none; background: var(--note-bg); }
        #lined-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 32px; background-position: 0 10px;
        }
        canvas { position: absolute; top: 0; left: 0; }
        
        .page-indicator { color: white; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div id="note-trigger">📝</div>

<div class="swiper swiper-main">
    <div id="gallery-wrapper" class="swiper-wrapper"></div>
</div>

<div id="note-overlay">
    <div class="nav-bar">
        <button class="btn" onclick="toggleNotes()">Galerie</button>
        <div class="page-indicator">Seite <span id="current-page-num">1</span></div>
        <button class="btn" style="background:#ff5252; color:white;" onclick="clearCurrentPage()">Löschen</button>
    </div>
    
    <div class="tool-bar">
        <button class="btn btn-page" onclick="prevPage()">◀</button>
        <button class="btn btn-page" onclick="nextPage()">▶</button>
        <button class="btn" onclick="addNewPage()">+ Neue Seite</button>
        <div style="flex:1"></div>
        <div class="color-dot" style="background:#fffde7" onclick="changeBg('#fffde7')"></div>
        <div class="color-dot" style="background:#ffffff" onclick="changeBg('#ffffff')"></div>
        <div class="color-dot" style="background:#e3f2fd" onclick="changeBg('#e3f2fd')"></div>
        <div class="color-dot" style="background:#e8f5e9" onclick="changeBg('#e8f5e9')"></div>
    </div>

    <div id="canvas-container">
        <div id="lined-pattern"></div>
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // --- 1. BILDER LOGIK ---
    const wrapper = document.getElementById('gallery-wrapper');
    const moeglicheEndungen = [".png", ".PNG", ".jpg", ".JPG", ".jpeg"];

    async function initGallery() {
        for (let i = 1; i <= 100; i++) {
            let nummer = i.toString().padStart(2, '0');
            for (let endung of moeglicheEndungen) {
                const pfad = `${nummer}${endung}`;
                const existiert = await new Promise(res => {
                    const img = new Image(); img.onload = () => res(true); img.onerror = () => res(false); img.src = pfad;
                });
                if (existiert) {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.innerHTML = `<img src="${pfad}">`;
                    wrapper.appendChild(slide);
                    break; 
                }
            }
        }
        new Swiper('.swiper-main', { slidesPerView: 2, keyboard: true, grabCursor: true });
    }

    // --- 2. NOTIZ SEITEN LOGIK ---
    let pages = JSON.parse(localStorage.getItem('notebook_pages')) || [""];
    let currentPageIndex = 0;
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - offset;
        drawPage();
    }

    function drawPage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const data = pages[currentPageIndex];
        if (data && data.length > 10) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data;
        }
        document.getElementById('current-page-num').innerText = currentPageIndex + 1;
    }

    function saveCurrentPage() {
        pages[currentPageIndex] = canvas.toDataURL();
        localStorage.setItem('notebook_pages', JSON.stringify(pages));
    }

    // Touch Events
    const getPos = (e) => {
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        return { x: e.touches[0].clientX, y: e.touches[0].clientY - offset };
    };

    canvas.addEventListener('touchstart', (e) => {
        drawing = true; ctx.beginPath();
        const p = getPos(e); ctx.moveTo(p.x, p.y);
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchmove', (e) => {
        if(!drawing) return;
        const p = getPos(e);
        ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#222';
        ctx.lineTo(p.x, p.y); ctx.stroke();
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchend', () => { drawing = false; saveCurrentPage(); });

    // Navigation
    function nextPage() { if(currentPageIndex < pages.length - 1) { saveCurrentPage(); currentPageIndex++; drawPage(); } }
    function prevPage() { if(currentPageIndex > 0) { saveCurrentPage(); currentPageIndex--; drawPage(); } }
    function addNewPage() { saveCurrentPage(); pages.push(""); currentPageIndex = pages.length - 1; drawPage(); }
    function clearCurrentPage() { if(confirm("Seite löschen?")) { ctx.clearRect(0,0,canvas.width,canvas.height); saveCurrentPage(); } }
    
    function changeBg(color) {
        document.getElementById('canvas-container').style.background = color;
        localStorage.setItem('notebook_bg', color);
    }

    function toggleNotes() {
        const overlay = document.getElementById('note-overlay');
        const isOpening = overlay.style.display !== 'flex';
        overlay.style.display = isOpening ? 'flex' : 'none';
        if(isOpening) {
            const savedBg = localStorage.getItem('notebook_bg') || '#fffde7';
            changeBg(savedBg);
            resizeCanvas();
        }
    }

    document.getElementById('note-trigger').onclick = toggleNotes;
    window.addEventListener('resize', resizeCanvas);
    initGallery();
</script>
</body>
</html>
