<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DCS Kneeboard & Notes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { 
            --dark-ui: #1a1a1a;
            --accent-gold: #fbc02d;
            --line-color: rgba(0,0,0,0.12); 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; touch-action: none; }
        
        .swiper-main { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; }
        .swiper-slide img { max-width: 100%; max-height: 90%; object-fit: contain; }
        
        /* Scrollbar: Small look, huge touch area */
        .swiper-scrollbar { 
            height: 40px !important; /* Huge area to grab */
            background: transparent !important; 
            bottom: 5px !important; 
            display: flex;
            align-items: center;
        }
        /* This is the actual visible thin line */
        .swiper-scrollbar-drag { 
            height: 4px !important; 
            background: var(--accent-gold) !important;
            border-radius: 2px;
        }

        #note-trigger {
            position: fixed; bottom: 50px; right: 30px;
            width: 70px; height: 70px; background: #2c2c2c;
            border-radius: 20px; display: flex; justify-content: center;
            align-items: center; z-index: 1000; border: 2px solid var(--accent-gold);
        }
        #note-trigger svg { width: 35px; height: 35px; fill: #ffd700; }

        #note-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: none; flex-direction: column;
        }
        
        .nav-bar, .tool-bar {
            display: flex; gap: 12px; align-items: center;
            padding: env(safe-area-inset-top) 15px 10px 15px; background: var(--dark-ui);
        }

        .btn { 
            padding: 12px 18px; border: none; border-radius: 10px; background: #444; color: white; 
            font-weight: bold; cursor: pointer; font-size: 16px; min-height: 50px;
        }
        .btn-add { background: #388e3c; }
        .btn-del-page { background: #d32f2f; }
        .btn-active { background: var(--accent-gold); color: black; }

        #bg-picker-container { display: flex; align-items: center; gap: 8px; color: white; font-size: 14px; }
        #bg-picker { width: 45px; height: 45px; border-radius: 8px; border: 2px solid #666; background: none; }

        #tab-container { display: flex; gap: 8px; overflow-x: auto; flex: 1; }
        .tab { padding: 12px 20px; background: #333; color: #fff; border-radius: 10px; border: none; font-size: 15px; white-space: nowrap; }
        .tab.active { background: var(--accent-gold); color: #000; font-weight: bold; }

        #canvas-container { flex: 1; position: relative; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="note-trigger">
    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
</div>

<div class="swiper swiper-main">
    <div id="gallery-wrapper" class="swiper-wrapper"></div>
    <div class="swiper-scrollbar"></div>
</div>

<div id="note-overlay">
    <div class="nav-bar">
        <button class="btn" onclick="toggleNotes()">Gallery</button>
        <div id="tab-container"></div>
        <button class="btn btn-add" onclick="addNewPage()">Add Page</button>
        <button class="btn btn-del-page" onclick="deleteCurrentPage()">Delete</button>
    </div>
    
    <div class="tool-bar">
        <button id="tool-pen" class="btn btn-active" onclick="setTool('pen')">Pen</button>
        <button id="tool-eraser" class="btn" onclick="setTool('eraser')">Eraser</button>
        <button class="btn" onclick="undo()">Undo</button>
        <button class="btn" onclick="clearCanvas()">Clear All</button>
        <div style="flex:1"></div>
        <div id="bg-picker-container">
            <span>BG Color:</span>
            <input type="color" id="bg-picker" value="#ffeb3b" oninput="changePageColor(this.value)">
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const wrapper = document.getElementById('gallery-wrapper');
    const moeglicheEndungen = [".png", ".jpg", ".jpeg", ".PNG", ".JPG"];

    async function initGallery() {
        for (let i = 1; i <= 50; i++) {
            let nummer = i.toString().padStart(2, '0');
            for (let endung of moeglicheEndungen) {
                const pfad = `${nummer}${endung}`;
                const existiert = await new Promise(res => {
                    const img = new Image(); img.onload = () => res(true); img.onerror = () => res(false); img.src = pfad;
                });
                if (existiert) {
                    const slide = document.createElement('div'); slide.className = 'swiper-slide';
                    slide.innerHTML = `<img src="${pfad}">`; wrapper.appendChild(slide);
                    break; 
                }
            }
        }
        new Swiper('.swiper-main', { slidesPerView: 2, scrollbar: { el: '.swiper-scrollbar', draggable: true } });
    }

    let pages = JSON.parse(localStorage.getItem('dcs_notes_v8')) || [{ image: "", color: "#ffeb3b" }];
    let currentPageIndex = 0;
    let currentTool = 'pen';
    let historyStack = [];
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - offset;
        drawPage();
        renderTabs();
    }

    function renderTabs() {
        const container = document.getElementById('tab-container');
        container.innerHTML = "";
        pages.forEach((_, index) => {
            const t = document.createElement('button');
            t.className = `tab ${index === currentPageIndex ? 'active' : ''}`;
            t.innerText = `Page ${index + 1}`;
            t.onclick = () => { saveCurrentState(); currentPageIndex = index; drawPage(); renderTabs(); };
            container.appendChild(t);
        });
    }

    function drawPage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const page = pages[currentPageIndex];
        document.getElementById('canvas-container').style.background = page.color || "#ffeb3b";
        document.getElementById('bg-picker').value = page.color || "#ffeb3b";
        if (page.image && page.image.length > 100) {
            const img = new Image(); img.onload = () => { ctx.drawImage(img, 0, 0); saveToHistory(); };
            img.src = page.image;
        } else { saveToHistory(); }
    }

    function saveCurrentState() {
        pages[currentPageIndex].image = canvas.toDataURL();
        localStorage.setItem('dcs_notes_v8', JSON.stringify(pages));
    }

    function saveToHistory() {
        historyStack.push(canvas.toDataURL());
        if (historyStack.length > 20) historyStack.shift();
    }

    function undo() {
        if (historyStack.length > 1) {
            historyStack.pop();
            const img = new Image();
            img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); saveCurrentState(); };
            img.src = historyStack[historyStack.length - 1];
        }
    }

    function changePageColor(color) {
        pages[currentPageIndex].color = color;
        document.getElementById('canvas-container').style.background = color;
        saveCurrentState();
    }

    function addNewPage() {
        saveCurrentState();
        pages.push({ image: "", color: "#ffeb3b" });
        currentPageIndex = pages.length - 1;
        historyStack = [];
        resizeCanvas();
    }

    function deleteCurrentPage() {
        if (pages.length > 1) {
            pages.splice(currentPageIndex, 1);
            currentPageIndex = Math.max(0, currentPageIndex - 1);
            historyStack = [];
            resizeCanvas();
            localStorage.setItem('dcs_notes_v8', JSON.stringify(pages));
        } else { clearCanvas(); }
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        saveCurrentState(); saveToHistory();
    }

    canvas.addEventListener('touchstart', (e) => {
        drawing = true; ctx.beginPath();
        const rect = canvas.getBoundingClientRect();
        ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.lineWidth = (currentTool === 'eraser' ? 45 : 2.5);
        ctx.globalCompositeOperation = (currentTool === 'eraser' ? 'destination-out' : 'source-over');
        ctx.strokeStyle = '#111';
        ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        ctx.stroke();
    }, {passive: false});

    canvas.addEventListener('touchend', () => { if(drawing) { drawing = false; saveCurrentState(); saveToHistory(); } });

    function setTool(t) { 
        currentTool = t; 
        document.getElementById('tool-pen').classList.toggle('btn-active', t==='pen'); 
        document.getElementById('tool-eraser').classList.toggle('btn-active', t==='eraser'); 
    }

    function toggleNotes() { 
        const o = document.getElementById('note-overlay'); 
        o.style.display = (o.style.display !== 'flex' ? 'flex' : 'none'); 
        if(o.style.display==='flex') resizeCanvas(); 
    }

    document.getElementById('note-trigger').onclick = toggleNotes;
    window.addEventListener('resize', resizeCanvas);
    initGallery();
</script>
</body>
</html>
