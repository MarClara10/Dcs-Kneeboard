<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Checklist & Tabs Pro</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root { 
            --note-bg: #ffee58; 
            --line-color: rgba(0,0,0,0.15); 
            --ui-acc: #fbc02d;
            --dark-ui: #1a1a1a;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; touch-action: none; }
        
        /* Galerie & Scrollbar */
        .swiper-main { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; border-right: 1px solid #222; }
        .swiper-slide img { max-width: 98%; max-height: 90%; object-fit: contain; }
        .swiper-scrollbar { height: 12px !important; background: rgba(255, 255, 255, 0.1) !important; bottom: 10px !important; }
        .swiper-scrollbar-drag { background: var(--ui-acc) !important; }

        #note-trigger {
            position: fixed; bottom: 50px; right: 30px;
            width: 70px; height: 70px; background: #ffeb3b;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 35px; border: 3px solid #fff;
        }

        /* Notiz-Overlay */
        #note-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--note-bg); z-index: 2000; display: none; flex-direction: column;
        }
        
        .nav-bar {
            display: flex; gap: 10px; align-items: center;
            padding: env(safe-area-inset-top) 10px 5px 10px; background: var(--dark-ui);
        }

        /* Tab-System */
        #tab-container {
            display: flex; gap: 5px; overflow-x: auto; flex: 1;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        #tab-container::-webkit-scrollbar { display: none; }
        
        .tab {
            padding: 8px 15px; background: #333; color: #aaa; border-radius: 8px 8px 0 0;
            font-size: 13px; white-space: nowrap; cursor: pointer; border: none;
        }
        .tab.active { background: #555; color: #fff; font-weight: bold; }

        .tool-bar {
            display: flex; gap: 12px; padding: 10px 15px; background: #2a2a2a; 
            align-items: center; border-bottom: 1px solid #444;
        }

        .btn { padding: 8px 12px; border: none; border-radius: 6px; background: #444; color: white; font-weight: bold; cursor: pointer; }
        .btn-add { background: #4caf50; }
        .btn-del { background: #e53935; }
        .btn-active { background: var(--ui-acc); color: black; }

        /* Kräftige Farben */
        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; flex-shrink: 0; }

        #canvas-container { flex: 1; position: relative; }
        #lined-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 32px; background-position: 0 10px;
        }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="note-trigger">📝</div>

<div class="swiper swiper-main">
    <div id="gallery-wrapper" class="swiper-wrapper"></div>
    <div class="swiper-scrollbar"></div>
</div>

<div id="note-overlay">
    <div class="nav-bar">
        <button class="btn" onclick="toggleNotes()">Galerie</button>
        <div id="tab-container"></div>
        <button class="btn btn-add" onclick="addNewPage()">+ Seite</button>
    </div>
    
    <div class="tool-bar">
        <button id="tool-pen" class="btn btn-active" onclick="setTool('pen')">✏️ Stift</button>
        <button id="tool-eraser" class="btn" onclick="setTool('eraser')">🧼 Radierer</button>
        <button class="btn btn-del" onclick="clearCurrentPage()">Löschen</button>
        
        <div style="flex:1"></div>
        
        <div class="color-dot" style="background:#ffeb3b" onclick="changeBg('#ffeb3b')"></div> <div class="color-dot" style="background:#ffffff" onclick="changeBg('#ffffff')"></div> <div class="color-dot" style="background:#2196f3" onclick="changeBg('#2196f3')"></div> <div class="color-dot" style="background:#4caf50" onclick="changeBg('#4caf50')"></div> </div>

    <div id="canvas-container">
        <div id="lined-pattern"></div>
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const wrapper = document.getElementById('gallery-wrapper');
    const moeglicheEndungen = [".png", ".PNG", ".jpg", ".JPG", ".jpeg", ".JPEG"];

    async function initGallery() {
        for (let i = 1; i <= 100; i++) {
            let nummer = i.toString().padStart(2, '0');
            for (let endung of moeglicheEndungen) {
                const pfad = `${nummer}${endung}`;
                const existiert = await new Promise(res => {
                    const img = new Image(); img.onload = () => res(true); img.onerror = () => res(false); img.src = pfad;
                });
                if (existiert) {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.innerHTML = `<img src="${pfad}">`;
                    wrapper.appendChild(slide);
                    break; 
                }
            }
        }
        new Swiper('.swiper-main', { 
            slidesPerView: 2, scrollbar: { el: '.swiper-scrollbar', draggable: true }, keyboard: true 
        });
    }

    // Notiz Logik mit Tabs
    let pages = JSON.parse(localStorage.getItem('notebook_v5')) || [""];
    let currentPageIndex = 0;
    let currentTool = 'pen';
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - offset;
        renderTabs();
        drawPage();
    }

    function renderTabs() {
        const container = document.getElementById('tab-container');
        container.innerHTML = "";
        pages.forEach((_, index) => {
            const t = document.createElement('button');
            t.className = `tab ${index === currentPageIndex ? 'active' : ''}`;
            t.innerText = `Seite ${index + 1}`;
            t.onclick = () => { saveCurrent(); currentPageIndex = index; drawPage(); renderTabs(); };
            container.appendChild(t);
        });
    }

    function drawPage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const data = pages[currentPageIndex];
        if (data && data.length > 100) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data;
        }
    }

    function saveCurrent() { pages[currentPageIndex] = canvas.toDataURL(); localStorage.setItem('notebook_v5', JSON.stringify(pages)); }

    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1 && e.touches[0].touchType !== 'stylus') return;
        drawing = true; ctx.beginPath();
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        ctx.moveTo(e.touches[0].clientX, e.touches[0].clientY - offset);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!drawing || (e.touches.length > 1 && e.touches[0].touchType !== 'stylus')) return;
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (currentTool === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 40;
        } else {
            ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = '#111';
            ctx.lineWidth = (e.touches[0].touchType === 'stylus') ? 2.0 : 2.5;
        }
        ctx.lineTo(e.touches[0].clientX, e.touches[0].clientY - offset);
        ctx.stroke();
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', () => { drawing = false; saveCurrent(); });

    function setTool(t) { currentTool = t; document.getElementById('tool-pen').classList.toggle('btn-active', t==='pen'); document.getElementById('tool-eraser').classList.toggle('btn-active', t==='eraser'); }
    function addNewPage() { saveCurrent(); pages.push(""); currentPageIndex = pages.length - 1; renderTabs(); drawPage(); }
    function clearCurrentPage() { if(confirm("Seite löschen?")) { ctx.clearRect(0,0,canvas.width,canvas.height); saveCurrent(); } }
    function changeBg(c) { document.getElementById('canvas-container').style.background = c; }
    function toggleNotes() { const o = document.getElementById('note-overlay'); o.style.display = (o.style.display !== 'flex' ? 'flex' : 'none'); if(o.style.display==='flex') resizeCanvas(); }

    document.getElementById('note-trigger').onclick = toggleNotes;
    window.addEventListener('resize', resizeCanvas);
    initGallery();
</script>
</body>
</html>
