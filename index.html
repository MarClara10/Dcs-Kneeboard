<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DCS Checklist & Notes Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { 
            --dark-ui: #1a1a1a;
            --accent-gold: #fbc02d;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; touch-action: none; }
        
        /* Galerie & Riesige Scrollbar */
        .swiper-main { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; }
        .swiper-slide img { max-width: 100%; max-height: 90%; object-fit: contain; }
        
        /* Treffsichere Scrollbar */
        .swiper-scrollbar { 
            height: 30px !important; 
            background: rgba(255, 255, 255, 0.15) !important; 
            bottom: 10px !important; 
            border-radius: 15px !important;
        }
        .swiper-scrollbar-drag { background: var(--accent-gold) !important; }

        /* Notiz-Overlay & Große Buttons */
        #note-trigger {
            position: fixed; bottom: 50px; right: 30px;
            width: 70px; height: 70px; background: #2c2c2c;
            border-radius: 20px; display: flex; justify-content: center;
            align-items: center; z-index: 1000; border: 2px solid var(--accent-gold);
        }
        #note-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; flex-direction: column; }
        
        .nav-bar, .tool-bar { display: flex; gap: 12px; padding: 10px; background: var(--dark-ui); align-items: center; }
        .btn { 
            padding: 12px 20px; border: none; border-radius: 10px; background: #444; color: white; 
            font-weight: bold; font-size: 16px; cursor: pointer; min-height: 50px;
        }
        .btn-active { background: var(--accent-gold); color: black; }
        
        /* Farbwähler */
        #bg-picker { width: 50px; height: 50px; border: none; background: none; cursor: pointer; }

        #canvas-container { flex: 1; position: relative; }
        canvas { position: absolute; top: 0; left: 0; }
        #tab-container { display: flex; gap: 8px; overflow-x: auto; flex: 1; }
        .tab { padding: 10px 18px; background: #333; color: #fff; border-radius: 8px; border: none; font-size: 15px; }
        .tab.active { background: var(--accent-gold); color: #000; }
    </style>
</head>
<body>

<div id="note-trigger"><svg width="40" height="40" viewBox="0 0 24 24" fill="#ffd700"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg></div>

<div class="swiper swiper-main">
    <div id="gallery-wrapper" class="swiper-wrapper"></div>
    <div class="swiper-scrollbar"></div>
</div>

<div id="note-overlay">
    <div class="nav-bar">
        <button class="btn" onclick="toggleNotes()">Galerie</button>
        <div id="tab-container"></div>
        <button class="btn" style="background:#388e3c" onclick="addNewPage()">+ Seite</button>
    </div>
    
    <div class="tool-bar">
        <button id="tool-pen" class="btn btn-active" onclick="setTool('pen')">✏️</button>
        <button id="tool-eraser" class="btn" onclick="setTool('eraser')">🧼</button>
        <button class="btn" onclick="undo()">↩️ Zurück</button>
        <button class="btn" onclick="clearCanvas()">🗑️ Leeren</button>
        <div style="flex:1"></div>
        <label style="color:white; font-size:12px">BG:</label>
        <input type="color" id="bg-picker" value="#ffeb3b" oninput="changePageColor(this.value)">
    </div>

    <div id="canvas-container">
        <canvas id="noteCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // Galerie Init (wie gehabt)
    async function initGallery() {
        const wrapper = document.getElementById('gallery-wrapper');
        for (let i = 1; i <= 50; i++) {
            let p = i.toString().padStart(2, '0') + ".png";
            const img = new Image(); img.src = p;
            const exist = await new Promise(r => { img.onload=()=>r(true); img.onerror=()=>r(false); });
            if (exist) {
                const s = document.createElement('div'); s.className='swiper-slide';
                s.innerHTML=`<img src="${p}">`; wrapper.appendChild(s);
            }
        }
        new Swiper('.swiper-main', { scrollbar: { el: '.swiper-scrollbar', draggable: true } });
    }

    // Notiz Logik mit Undo
    let pages = JSON.parse(localStorage.getItem('dcs_notes_v7')) || [{ image: "", color: "#ffeb3b" }];
    let currentPageIndex = 0;
    let history = []; 
    let currentTool = 'pen';
    const canvas = document.getElementById('noteCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        const offset = document.querySelector('.nav-bar').offsetHeight + document.querySelector('.tool-bar').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - offset;
        drawPage();
        renderTabs();
    }

    function renderTabs() {
        const c = document.getElementById('tab-container'); c.innerHTML = "";
        pages.forEach((_, i) => {
            const b = document.createElement('button'); b.className=`tab ${i===currentPageIndex?'active':''}`;
            b.innerText=`S.${i+1}`; b.onclick=()=>{ saveCurrentState(); currentPageIndex=i; drawPage(); renderTabs(); };
            c.appendChild(b);
        });
    }

    function drawPage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const p = pages[currentPageIndex];
        document.getElementById('canvas-container').style.background = p.color;
        document.getElementById('bg-picker').value = p.color;
        if (p.image) {
            const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = p.image;
        }
        history = [canvas.toDataURL()]; // Reset history for new page
    }

    function saveCurrentState() {
        pages[currentPageIndex].image = canvas.toDataURL();
        localStorage.setItem('dcs_notes_v7', JSON.stringify(pages));
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                saveCurrentState();
            };
            img.src = history[history.length - 1];
        }
    }

    function changePageColor(c) {
        pages[currentPageIndex].color = c;
        document.getElementById('canvas-container').style.background = c;
        saveCurrentState();
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        saveCurrentState();
        history = [canvas.toDataURL()];
    }

    function addNewPage() {
        saveCurrentState();
        pages.push({ image: "", color: "#ffeb3b" });
        currentPageIndex = pages.length - 1;
        resizeCanvas();
    }

    // Touch Handling
    canvas.addEventListener('touchstart', (e) => {
        drawing = true; ctx.beginPath();
        const rect = canvas.getBoundingClientRect();
        ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineCap = 'round'; ctx.lineWidth = (currentTool === 'eraser' ? 40 : 3);
        ctx.globalCompositeOperation = (currentTool === 'eraser' ? 'destination-out' : 'source-over');
        ctx.strokeStyle = '#000';
        ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        ctx.stroke();
        e.preventDefault();
    });

    canvas.addEventListener('touchend', () => { 
        drawing = false; 
        history.push(canvas.toDataURL());
        if(history.length > 20) history.shift(); // Limit history
        saveCurrentState(); 
    });

    function setTool(t) { 
        currentTool = t; 
        document.getElementById('tool-pen').className = (t==='pen' ? 'btn btn-active' : 'btn');
        document.getElementById('tool-eraser').className = (t==='eraser' ? 'btn btn-active' : 'btn');
    }

    function toggleNotes() {
        const o = document.getElementById('note-overlay');
        o.style.display = (o.style.display === 'flex' ? 'none' : 'flex');
        if(o.style.display === 'flex') resizeCanvas();
    }

    document.getElementById('note-trigger').onclick = toggleNotes;
    initGallery();
</script>
</body>
</html>
